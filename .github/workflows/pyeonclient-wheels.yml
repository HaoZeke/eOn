# Standalone PyPI package: pyeonclient
#
# Base wheels (always): RGPOT linked, no torch NEEDED — small manylinux.
# Metatomic wheels (optional matrix): WITH_METATOMIC against CPU torch from PyPI
#   (same distribution model as torch itself — not conda-forge-gated).
#
# Publish: tag pyeonclient-v* or workflow_dispatch with publish=true
name: pyeonclient wheels
concurrency:
  group: pyeonclient-wheels-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built wheels to PyPI"
        type: boolean
        default: false
      build_metatomic:
        description: "Also build CPU-metatomic wheels"
        type: boolean
        default: true
  push:
    tags:
      - "pyeonclient-v*"
  pull_request:
    paths:
      - "client/python/**"
      - "client/**/*.cpp"
      - "client/**/*.h"
      - "pyproject-pyeonclient.toml"
      - ".github/workflows/pyeonclient-wheels.yml"
      - "scripts/pyeonclient_*.sh"
      - "subprojects/**"
      - "meson.build"
      - "meson_options.txt"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: abi3-manylinux
            os: ubuntu-22.04
            python: "3.12"
            free_threaded: false
            cibw_build: "cp312-manylinux_x86_64"
            variant: base
          - name: cp313t-manylinux
            os: ubuntu-22.04
            python: "3.13"
            free_threaded: true
            cibw_build: "cp313t-manylinux_x86_64"
            variant: base
          - name: cp314t-manylinux
            os: ubuntu-22.04
            python: "3.14"
            free_threaded: true
            cibw_build: "cp314t-manylinux_x86_64"
            variant: base
          # CPU Metatomic linked wheel (pip torch — not conda-forge)
          - name: abi3-manylinux-metatomic
            os: ubuntu-22.04
            python: "3.12"
            free_threaded: false
            cibw_build: "cp312-manylinux_x86_64"
            variant: metatomic
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Skip optional metatomic on PR unless forced
        id: gate
        run: |
          if [[ "${{ matrix.variant }}" == "metatomic" ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.inputs.build_metatomic || 'true' }}" != "true" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Activate pyeonclient pyproject
        if: steps.gate.outputs.skip != 'true'
        run: bash scripts/pyeonclient_prepare_pyproject.sh

      - name: Install host build deps
        if: steps.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gfortran cmake pkg-config \
            libeigen3-dev ninja-build \
            python3-pip patchelf
          cargo install cbindgen 2>/dev/null || \
            (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
             . "$HOME/.cargo/env" && cargo install cbindgen)
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Meson config-settings for variant
        if: steps.gate.outputs.skip != 'true'
        id: cfg
        run: |
          # free-threaded: disable limited-api; metatomic: enable flags
          CFG=""
          if [[ "${{ matrix.free_threaded }}" == "true" ]]; then
            CFG+="setup-args=-Dpython.allow_limited_api=false"$'\n'
          fi
          if [[ "${{ matrix.variant }}" == "metatomic" ]]; then
            CFG+="setup-args=-Dwith_metatomic=true"$'\n'
            CFG+="setup-args=-Dwith_rgpot=true"$'\n'
            CFG+="setup-args=-Dpip_metatomic=true"$'\n'
          else
            CFG+="setup-args=-Dwith_metatomic=false"$'\n'
            CFG+="setup-args=-Dwith_rgpot=true"$'\n'
          fi
          # cibuildwheel uses CIBW_CONFIG_SETTINGS as space-separated
          # key=value pairs; emit one line for the env file.
          {
            echo "CIBW_CONFIG_SETTINGS<<EOF"
            # flatten to single line of setup-args=...
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              echo -n "$line "
            done <<< "$CFG"
            echo
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "variant=${{ matrix.variant }}"

      - uses: pypa/cibuildwheel@v2.23.3
        if: steps.gate.outputs.skip != 'true'
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_BUILD_FRONTEND: build
          CIBW_SKIP: "pp* *-win32 *-manylinux_i686 *-musllinux*"
          CIBW_ARCHS: native
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENABLE: ${{ matrix.free_threaded && 'cpython-freethreading' || '' }}
          CIBW_ENVIRONMENT: >-
            PATH=/root/.cargo/bin:$PATH
            CARGO_HOME=/root/.cargo
            PKG_CONFIG_PATH=/usr/local/lib64/pkgconfig:/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
            CMAKE_PREFIX_PATH=/usr/local
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y eigen3-devel gcc-gfortran patchelf || true
            export CARGO_HOME=/root/.cargo
            export PATH="/root/.cargo/bin:$PATH"
            command -v rustc || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . /root/.cargo/env
            command -v cbindgen || cargo install cbindgen
            # Cap'n Proto (RGPOT / ptlrpc) — vendored into the wheel by auditwheel
            if ! pkg-config --exists capnp 2>/dev/null; then
              rm -rf /tmp/capnp-src /tmp/capnp-build
              curl -fsSL -o /tmp/capnp.tgz \
                https://capnproto.org/capnproto-c++-1.0.2.tar.gz
              mkdir -p /tmp/capnp-src && tar -xzf /tmp/capnp.tgz -C /tmp/capnp-src --strip-components=1
              cmake -S /tmp/capnp-src -B /tmp/capnp-build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DBUILD_TESTING=OFF
              cmake --build /tmp/capnp-build -j$(nproc)
              cmake --install /tmp/capnp-build
              ldconfig || true
            fi
            if ! pkg-config --exists quill 2>/dev/null; then
              rm -rf /tmp/quill-src /tmp/quill-build
              curl -fsSL -o /tmp/quill.tgz https://github.com/odygrd/quill/archive/refs/tags/v11.0.2.tar.gz
              mkdir -p /tmp/quill-src && tar -xzf /tmp/quill.tgz -C /tmp/quill-src --strip-components=1
              cmake -S /tmp/quill-src -B /tmp/quill-build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DQUILL_BUILD_TESTS=OFF \
                -DQUILL_BUILD_EXAMPLES=OFF
              cmake --build /tmp/quill-build -j$(nproc)
              cmake --install /tmp/quill-build
            fi
          CIBW_BEFORE_BUILD: |
            pip install -U pip nanobind meson ninja meson-python auditwheel
            pip install --only-binary=:all: numpy || pip install numpy
            if [[ "${{ matrix.variant }}" == "metatomic" ]]; then
              # CPU torch from PyPI (not conda-forge)
              pip install --only-binary=:all: 'torch' \
                || pip install 'torch' --index-url https://download.pytorch.org/whl/cpu
              pip install 'metatensor' 'metatensor-torch' 'metatomic-torch' 'vesin' || true
            fi
          # Vendor libcapnp/libkj (not on manylinux allowlist) + strip host RPATH.
          # auditwheel when it works; our repair script always runs as the portableizer.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            bash -c 'auditwheel repair -w {dest_dir} {wheel} 2>/dev/null
            || cp -f {wheel} {dest_dir}/;
            bash scripts/pyeonclient_repair_wheel.sh {dest_dir}/pyeonclient-*.whl'
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: |
            python -c "import pyeonclient as p, pathlib, subprocess; print(p.__version__, 'mta', p.built_with_metatomic(), 'rgpot', p.built_with_rgpot()); assert p.built_with_rgpot(); core=next(pathlib.Path(p.__file__).parent.glob('_core*.so')); out=subprocess.check_output(['readelf','-d',str(core)],text=True); assert 'libtorch' not in out; print('NEEDED_OK')"

      - name: Tag metatomic wheels with local version (never collide with base)
        if: steps.gate.outputs.skip != 'true' && matrix.variant == 'metatomic'
        run: |
          # PyPI forbids local versions; these stay as GH artifacts only.
          mkdir -p wheelhouse-tagged
          for w in wheelhouse/*.whl; do
            base=$(basename "$w")
            # pyeonclient-0.3.0-... -> pyeonclient-0.3.0+metatomic-...
            tagged=$(echo "$base" | sed -E 's/^(pyeonclient-[0-9]+\.[0-9]+\.[0-9]+)-/\1+metatomic-/')
            cp -v "$w" "wheelhouse-tagged/$tagged"
          done
          rm -f wheelhouse/*.whl
          mv wheelhouse-tagged/* wheelhouse/
          ls -la wheelhouse/

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          name: pyeonclient-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Activate pyeonclient pyproject
        run: bash scripts/pyeonclient_prepare_pyproject.sh
      - name: Host deps for meson-python sdist
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev gfortran ninja-build
          cargo install cbindgen 2>/dev/null || true
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: |
          python -m pip install -U pip build nanobind numpy meson ninja meson-python
          python -m build --sdist
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: pyeonclient-sdist
          path: dist/*.tar.gz

  publish:
    needs: [build, sdist]
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/pyeonclient-v')
      || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi-pyeonclient
      url: https://pypi.org/p/pyeonclient
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Flatten artifacts (PyPI = base only; exclude +metatomic)
        run: |
          mkdir -p upload
          # sdist always
          find dist -type f -name '*.tar.gz' -exec cp -v {} upload/ \;
          # base wheels only — never publish local-version metatomic binaries
          find dist -type f -name '*.whl' ! -name '*+metatomic*' -exec cp -v {} upload/ \;
          echo "=== upload set (must not contain +metatomic) ==="
          ls -la upload/
          if ls upload/*+metatomic* 1>/dev/null 2>&1; then
            echo "refusing to publish metatomic local-version wheels to PyPI" >&2
            exit 1
          fi
          # detect filename collisions (same basename twice)
          if [[ "$(ls upload | sort | uniq -d | wc -l)" -ne 0 ]]; then
            echo "duplicate basenames in upload/" >&2
            ls upload | sort | uniq -d
            exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload/
          skip-existing: true
          verbose: true
