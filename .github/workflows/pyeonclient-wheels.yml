# Standalone PyPI package: pyeonclient
#
# Base wheels (always): RGPOT linked, no torch NEEDED - small manylinux.
# Metatomic wheels (optional matrix): WITH_METATOMIC against CPU torch from PyPI
#   (same distribution model as torch itself - not conda-forge-gated).
#
# Publish: tag pyeonclient-v* or workflow_dispatch with publish=true
#
# cibuildwheel version notes:
# - v3.2+: CPython 3.14 (incl. freethreading cp314t) is default - no enable flag.
# - v3.x still supports experimental cp313t via enable=cpython-freethreading.
# - v4.0 removes 3.13 freethreading; we stay on v3.2.1 for both 313t + 314t.
name: pyeonclient wheels
concurrency:
  group: pyeonclient-wheels-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built wheels to PyPI"
        type: boolean
        default: false
      build_metatomic:
        description: "Also build CPU-metatomic wheels"
        type: boolean
        default: true
  # NOTE: do not put paths: under push when also using tags:. With only tags
  # listed (no branches), branch pushes never run. With tags+paths, a tag that
  # does not touch those paths may not schedule either. Tags always run; branch
  # pushes restricted to main + feat/* for CI cost.
  push:
    tags:
      - "pyeonclient-v*"
    branches:
      - "main"
      - "feat/**"
      - "fix/**"
      - "ci/**"
  pull_request:
    paths:
      - "client/python/**"
      - "client/**/*.cpp"
      - "client/**/*.h"
      - "pyproject-pyeonclient.toml"
      - ".github/workflows/pyeonclient-wheels.yml"
      - "scripts/pyeonclient_*.sh"
      - "subprojects/**"
      - "meson.build"
      - "meson_options.txt"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: abi3-manylinux
            os: ubuntu-22.04
            free_threaded: false
            cibw_build: "cp312-manylinux_x86_64"
            # empty: 3.14 freethreading is default in cibuildwheel 3.2+; base is abi3
            cibw_enable: ""
            variant: base
            build_frontend: "build"
          - name: cp313t-manylinux
            os: ubuntu-22.04
            free_threaded: true
            cibw_build: "cp313t-manylinux_x86_64"
            # 3.13 freethreading still opt-in on cibuildwheel 3.x
            cibw_enable: "cpython-freethreading"
            variant: base
            build_frontend: "build"
          - name: cp314t-manylinux
            os: ubuntu-22.04
            free_threaded: true
            cibw_build: "cp314t-manylinux_x86_64"
            # 3.14 freethreading is default - do NOT set cpython-freethreading
            # (and do not use cibuildwheel 2.x which lacks cp314t tags).
            cibw_enable: ""
            variant: base
            build_frontend: "build"
          - name: abi3-manylinux-metatomic
            os: ubuntu-22.04
            free_threaded: false
            cibw_build: "cp312-manylinux_x86_64"
            cibw_enable: ""
            variant: metatomic
            # meson needs torch/metatensor modules in the *build* env
            build_frontend: "build;args: --no-isolation"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Skip optional metatomic on PR unless forced
        id: gate
        run: |
          if [[ "${{ matrix.variant }}" == "metatomic" ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.inputs.build_metatomic || 'true' }}" != "true" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Activate pyeonclient pyproject
        if: steps.gate.outputs.skip != 'true'
        run: bash scripts/pyeonclient_prepare_pyproject.sh

      - name: Install host build deps
        if: steps.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gfortran cmake pkg-config \
            libeigen3-dev ninja-build zlib1g-dev \
            python3-pip patchelf
          cargo install cbindgen 2>/dev/null || \
            (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
             . "$HOME/.cargo/env" && cargo install cbindgen)
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Meson config-settings for variant
        if: steps.gate.outputs.skip != 'true'
        id: cfg
        run: |
          CFG=""
          if [[ "${{ matrix.free_threaded }}" == "true" ]]; then
            # freethreaded CPython is not abi3
            CFG+="setup-args=-Dpython.allow_limited_api=false"$'\n'
          fi
          if [[ "${{ matrix.variant }}" == "metatomic" ]]; then
            CFG+="setup-args=-Dwith_metatomic=true"$'\n'
            CFG+="setup-args=-Dwith_rgpot=true"$'\n'
            CFG+="setup-args=-Dpip_metatomic=true"$'\n'
          else
            CFG+="setup-args=-Dwith_metatomic=false"$'\n'
            CFG+="setup-args=-Dwith_rgpot=true"$'\n'
          fi
          {
            echo "CIBW_CONFIG_SETTINGS<<EOF"
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              echo -n "$line "
            done <<< "$CFG"
            echo
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "variant=${{ matrix.variant }}"

      # v3.2.1: 3.14 (+ freethreading) default; 3.13t via enable=cpython-freethreading
      - uses: pypa/cibuildwheel@v3.2.1
        if: steps.gate.outputs.skip != 'true'
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ENABLE: ${{ matrix.cibw_enable }}
          CIBW_BUILD_FRONTEND: ${{ matrix.build_frontend }}
          CIBW_SKIP: "pp* *-win32 *-manylinux_i686 *-musllinux*"
          CIBW_ARCHS: native
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT: >-
            PATH=/root/.cargo/bin:$PATH
            CARGO_HOME=/root/.cargo
            LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib:$LD_LIBRARY_PATH
            PKG_CONFIG_PATH=/usr/local/lib64/pkgconfig:/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
            CMAKE_PREFIX_PATH=/usr/local
          CIBW_BEFORE_ALL_LINUX: |
            bash scripts/pyeonclient_manylinux_deps.sh
          CIBW_BEFORE_BUILD: |
            set -euo pipefail
            export LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib:${LD_LIBRARY_PATH:-}
            pip install -U pip nanobind meson ninja meson-python auditwheel
            pip install --only-binary=:all: numpy || pip install numpy
            if [[ "${{ matrix.variant }}" == "metatomic" ]]; then
              # Must be visible to the build Python (no-isolation frontend).
              pip install --only-binary=:all: 'torch' \
                || pip install 'torch' --index-url https://download.pytorch.org/whl/cpu
              pip install 'metatensor' 'metatensor-torch' 'metatomic-torch' 'vesin'
              python -c "import torch, metatensor, metatensor.torch, metatomic.torch, vesin; print('mta_modules_ok', torch.__version__)"
            fi
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            bash -c 'export LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib:${LD_LIBRARY_PATH:-};
            auditwheel repair -w {dest_dir} {wheel} 2>/dev/null
            || cp -f {wheel} {dest_dir}/;
            bash scripts/pyeonclient_repair_wheel.sh {dest_dir}/pyeonclient-*.whl'
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: |
            python -c "import pyeonclient as p, pathlib, subprocess; print(p.__version__, 'mta', p.built_with_metatomic(), 'rgpot', p.built_with_rgpot()); assert p.built_with_rgpot(); core=next(pathlib.Path(p.__file__).parent.glob('_core*.so')); out=subprocess.check_output(['readelf','-d',str(core)],text=True); assert 'libtorch' not in out or p.built_with_metatomic(); print('NEEDED_OK'); assert hasattr(p.NudgedElasticBand, 'path_frames')"

      - name: Tag metatomic wheels with local version (never collide with base)
        if: steps.gate.outputs.skip != 'true' && matrix.variant == 'metatomic'
        run: |
          mkdir -p wheelhouse-tagged
          for w in wheelhouse/*.whl; do
            base=$(basename "$w")
            tagged=$(echo "$base" | sed -E 's/^(pyeonclient-[0-9]+\.[0-9]+\.[0-9]+)-/\1+metatomic-/')
            cp -v "$w" "wheelhouse-tagged/$tagged"
          done
          rm -f wheelhouse/*.whl
          mv wheelhouse-tagged/* wheelhouse/
          ls -la wheelhouse/

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          name: pyeonclient-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Activate pyeonclient pyproject
        run: bash scripts/pyeonclient_prepare_pyproject.sh
      - name: Host deps (quill + capnp SHARED+PIC + cbindgen)
        run: |
          bash scripts/pyeonclient_manylinux_deps.sh
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/usr-local.conf
          echo "/usr/local/lib64" | sudo tee -a /etc/ld.so.conf.d/usr-local.conf
          sudo ldconfig
          export LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib:${LD_LIBRARY_PATH:-}
          export PKG_CONFIG_PATH=/usr/local/lib64/pkgconfig:/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}
          pkg-config --modversion quill
          pkg-config --modversion capnp
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=/usr/local" >> "$GITHUB_ENV"
      - run: |
          python -m pip install -U pip build nanobind numpy meson ninja meson-python
          # sdist configures the project; quill/capnp must resolve
          python -m build --sdist
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: pyeonclient-sdist
          path: dist/*.tar.gz

  publish:
    needs: [build, sdist]
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/pyeonclient-v')
      || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi-pyeonclient
      url: https://pypi.org/p/pyeonclient
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Flatten artifacts (PyPI = base only; exclude +metatomic)
        run: |
          mkdir -p upload
          find dist -type f -name '*.tar.gz' -exec cp -v {} upload/ \;
          find dist -type f -name '*.whl' ! -name '*+metatomic*' -exec cp -v {} upload/ \;
          echo "=== upload set (must not contain +metatomic) ==="
          ls -la upload/
          if ls upload/*+metatomic* 1>/dev/null 2>&1; then
            echo "refusing to publish metatomic local-version wheels to PyPI" >&2
            exit 1
          fi
          if [[ "$(ls upload | sort | uniq -d | wc -l)" -ne 0 ]]; then
            echo "duplicate basenames in upload/" >&2
            ls upload | sort | uniq -d
            exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload/
          skip-existing: true
          verbose: true
