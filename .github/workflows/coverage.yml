# Multi-language coverage for Codecov (python / cpp / fortran).
#
# Live dashboard: https://app.codecov.io/gh/TheochemUI/eOn
#
# Auth: Codecov GitHub App OIDC (use_oidc: true). Optional CODECOV_TOKEN for
# legacy upload tokens. fail_ci_if_error: false soft-fails upload so generation
# still greens the job.

name: Coverage

on:
  push:
    branches: [main, ci/coverage]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write

jobs:
  coverage-python:
    runs-on: ubuntu-22.04
    name: python coverage
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: true

      - name: Structural Codecov config gate
        shell: pixi run bash -e {0}
        run: bash scripts/check_codecov_config.sh

      - name: Generate python coverage
        shell: pixi run bash -e {0}
        run: |
          bash scripts/run_coverage_python.sh python_coverage.xml
          test -s python_coverage.xml
          head -c 400 python_coverage.xml; echo

      - name: Upload python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python
          path: python_coverage.xml
          if-no-files-found: error

      - name: Upload python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: python_coverage.xml
          flags: python
          name: eon-python
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-cpp:
    runs-on: ubuntu-22.04
    name: cpp coverage
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lcov

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: true

      - name: Install cbindgen
        shell: pixi run bash -e {0}
        run: command -v cbindgen || cargo install cbindgen

      - name: Generate C++ coverage
        shell: pixi run bash -e {0}
        env:
          EON_COV_BUILDDIR: bbdir-cov
        run: |
          which meson
          bash scripts/run_coverage_cpp.sh cpp_lcov.info
          test -s cpp_lcov.info
          bash scripts/run_coverage_fortran.sh fortran_lcov.info || true
          ls -la cpp_lcov.info fortran_lcov.info 2>/dev/null || true

      - name: Upload cpp coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cpp
          path: |
            cpp_lcov.info
            fortran_lcov.info
          if-no-files-found: error

      - name: Upload cpp coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: cpp_lcov.info
          flags: cpp
          name: eon-cpp
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload fortran coverage to Codecov
        if: hashFiles('fortran_lcov.info') != ''
        uses: codecov/codecov-action@v5
        with:
          files: fortran_lcov.info
          flags: fortran
          name: eon-fortran
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-fortran:
    runs-on: ubuntu-22.04
    name: fortran coverage
    steps:
      - uses: actions/checkout@v4

      - name: Install gfortran + lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gfortran lcov

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: true

      - name: Install cbindgen
        shell: pixi run bash -e {0}
        run: command -v cbindgen || cargo install cbindgen

      - name: Generate Fortran coverage
        shell: pixi run bash -e {0}
        env:
          EON_COV_BUILDDIR: bbdir-cov
        run: |
          which meson gfortran
          # Full meson coverage tree exercises pot Fortran via unit tests.
          bash scripts/run_coverage_cpp.sh /tmp/cpp_for_fort.info || true
          bash scripts/run_coverage_fortran.sh fortran_lcov.info
          test -s fortran_lcov.info
          grep -E '^(SF:|DA:)' fortran_lcov.info | head -15

      - name: Upload fortran coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-fortran
          path: fortran_lcov.info
          if-no-files-found: error

      - name: Upload fortran coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: fortran_lcov.info
          flags: fortran
          name: eon-fortran
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
