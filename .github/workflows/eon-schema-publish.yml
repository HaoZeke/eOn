# Split PyPI package: eon-schema (pure Python)
#
# Publish on tag eon-schema-v* or workflow_dispatch with publish=true.
# Auth: PyPI Trusted Publishing (OIDC) → GitHub Environment pypi-eon-schema.
name: eon-schema publish
concurrency:
  group: eon-schema-publish-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish sdist/wheel to PyPI"
        type: boolean
        default: false
  push:
    tags:
      - "eon-schema-v*"
  pull_request:
    paths:
      - "packages/eon-schema/**"
      - ".github/workflows/eon-schema-publish.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build sdist and wheel
        working-directory: packages/eon-schema
        run: |
          python -m pip install -U pip build twine
          python -m build
          twine check dist/*
          ls -la dist/
      - name: Import smoke
        working-directory: packages/eon-schema
        run: |
          python -m pip install dist/eon_schema-*.whl
          python -c "from eon_schema.api import NebSpec, DimerSpec; from eon_schema.config import write_ini; from eon_schema.fields import PathInit; print(NebSpec(path_init=PathInit.file, path_list='x').n_images, DimerSpec())"
      - uses: actions/upload-artifact@v4
        with:
          name: eon-schema-dist
          path: packages/eon-schema/dist/*
          if-no-files-found: error

  publish:
    needs: [build]
    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/eon-schema-v')
      || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi-eon-schema
      url: https://pypi.org/p/eon-schema
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: eon-schema-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
