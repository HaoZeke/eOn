name: Build and test eonclient with Rgpot
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on: [push, pull_request]
jobs:
  build_rgpot:
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: true
          activate-environment: true
          environments: >-
            serve
      - name: Install cbindgen
        shell: bash
        run: command -v cbindgen || cargo install cbindgen
      - name: Build with rgpot potential
        shell: pixi run bash -e {0}
        run: |
          meson setup bbdir \
            --prefix=$CONDA_PREFIX \
            --libdir=lib \
            --buildtype release \
            -Dwith_rgpot=true \
            -Dwith_tests=true
          meson compile -C bbdir
      - name: Build rgpot fake engines
        shell: pixi run bash -e {0}
        run: |
          # Compile the rgpot fake engines directly: rgpot's meson test targets
          # need Catch2, which the serve env does not carry. The cpmdc fake
          # uses the capnp header generated during the eonclient build.
          cc -shared -fPIC -O2 \
            -I subprojects/rgpot/CppCore/rgpot/NWChemPot \
            subprojects/rgpot/CppCore/tests/nwchemc_fake_engine.c \
            -o libnwchemc_fake_engine.so
          c++ -shared -fPIC -O2 \
            -I subprojects/rgpot/CppCore \
            -I subprojects/rgpot/CppCore/rgpot/CPMDPot \
            -I bbdir/subprojects/rgpot/CppCore \
            subprojects/rgpot/CppCore/tests/cpmdc_fake_engine.cc \
            -lcapnp -lkj \
            -o libcpmdc_fake_engine.so
      - name: Run rgpot potential tests
        shell: pixi run bash -e {0}
        run: |
          export NWCHEMC_LIBRARY=$PWD/libnwchemc_fake_engine.so
          export CPMDC_LIBRARY=$PWD/libcpmdc_fake_engine.so
          meson test -C bbdir --suite rgpot --print-errorlogs
