name: Build and test eonclient with Rgpot
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on: [push, pull_request]
jobs:
  build_rgpot:
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: true
          activate-environment: true
          environments: >-
            serve
      - name: Install cbindgen
        shell: bash
        run: command -v cbindgen || cargo install cbindgen
      - name: Build with rgpot potential
        shell: pixi run bash -e {0}
        run: |
          meson setup bbdir \
            --prefix=$CONDA_PREFIX \
            --libdir=lib \
            --buildtype release \
            -Dwith_rgpot=true \
            -Dwith_tests=true
          meson compile -C bbdir
      - name: Build rgpot fake engines
        shell: pixi run bash -e {0}
        run: |
          meson setup bbdir-rgpot-fakes subprojects/rgpot \
            --buildtype release \
            -Dwith_rpc=true \
            -Dwith_tests=true
          meson compile -C bbdir-rgpot-fakes \
            nwchemc_fake_engine cpmdc_fake_engine
      - name: Run rgpot potential tests
        shell: pixi run bash -e {0}
        run: |
          export NWCHEMC_LIBRARY=$PWD/bbdir-rgpot-fakes/CppCore/libnwchemc_fake_engine.so
          export CPMDC_LIBRARY=$PWD/bbdir-rgpot-fakes/CppCore/libcpmdc_fake_engine.so
          meson test -C bbdir --suite rgpot --print-errorlogs
